---
layout: default
---
<style>
    code {
        background-color: #333;
        color: crimson;
    }

    #map {
        width: 100%;
        height: 70vh;
    }

    #searchBar {
        margin: 0 1rem;
    }

    .build p {
        margin-top: 0;
        margin-left: 40px;
    }
    .build b {
        color: var(--color-dark-theme);
    }
</style>

<svg id="map" viewBox="-200 -200 600 600">
    <image href="./ninoarura.webp" x="-400" y="-400" width="900" height="900"/>
</svg>

<p>
    Search using name, description, exact match of the owner's name, or <code>[x],[z]</code> format for coordinate<br>
    You can also click on the map to search for builds at that location
</p>
<label>
    Search
    <input id="searchBar" oninput="runSearch()">
</label>
<p>Found <span id="searchInfo"></span> result(s)</p>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<script src="./registry.js"></script>
<script src="./scripts.js"></script>
<script>
    function runSearch(first) {
        // first run, use hash location
        if (first)
            document.getElementById('searchBar').value = window.location.hash.substring(1);
        // get builds
        let builds = buildSearch( document.getElementById('searchBar').value );
        let result = document.getElementById('result');
        result.innerHTML = '';
        // reverse builds to get newest result first
        builds.reverse()
        // display build information
        for (const build of builds) {
            let res = ''; // result
            for (const prop in build) {
                if (prop == 'nw') {
                    // if it is cord
                    let c = build[prop];
                    res += `North-West block: ${c.x}, ${c.z}`;
                }
                else if (typeof(build[prop]) == "object") 'pass'; // to prevent objects being log
                else if (prop != 'id') res += `${prop}: ${build[prop]}<br>`;
            }
            result.innerHTML +=
                `<div class="build" onclick="copyToClipboard(${build.nw.x}, ${build.nw.z})">
                    <b>${build.id}</b>
                    <p>${res}</p>
                </div>`;
        }
        document.getElementById('searchInfo').innerHTML = builds.length;
    }
    runSearch(true); // run first time to get all results

    // copy coordinates to clipboard as minecraft command
    function copyToClipboard(x, z) {
        navigator.clipboard.writeText(`/tp ${x} 150 ${z}`);
        alert(`Copied to clipboard: ${x} 150 ${z}`);
    }

    // Map integration
    let map = document.getElementById('map');
    for (const build of REGISTRY) {
        let c = build.nw;
        let width = build.se.x - c.x,
            height = build.se.z - c.z;
        if (width <= 0 || height <= 0) console.log(build.id); // invalid build

        let block = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        block.setAttribute('x', c.x);
        block.setAttribute('y', c.z);
        block.setAttribute('width', width);
        block.setAttribute('height', height);
        block.setAttribute('fill', '#ff000050');
        block.setAttribute('stroke', 'black');
        block.setAttribute('stroke-width', '0.5');
        block.onclick = () => console.log(build);
        map.appendChild(block);
    }

    // initialize svg-pan-zoom after elements are added
    svgPanZoom(map, {
        zoomEnabled: true,
        controlIconsEnabled: true,
    });
    // svg-pan-zoom wraps the original SVG content in a <g> element
    let mapGroup = map.querySelector('g');

    mapGroup.addEventListener('click', (event) => {
        const pt = map.createSVGPoint();
        pt.x = event.clientX;
        pt.y = event.clientY;
        const svgP = pt.matrixTransform(mapGroup.getScreenCTM().inverse());
        document.getElementById('searchBar').value =
            `${Math.round(svgP.x)}, ${Math.round(svgP.y)}`;
        runSearch();
    });
</script>
